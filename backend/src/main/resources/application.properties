spring.application.name=ProjectBackend

server.port=8443
server.ssl.certificate=classpath:certs/localhost.crt
server.ssl.certificate-private-key=classpath:certs/localhost.key

management.endpoints.web.exposure.include=health,info,metrics
spring.jpa.open-in-view=true

spring.config.import=optional:file:.env[.properties]

spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:Frict}?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USERNAME}
spring.datasource.password=${MYSQL_PASSWORD}

spring.data.mongodb.uri=${MONGODB_URI}

logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG

logging.level.com.tfg.backend=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
spring.mvc.log-request-details=true

spring.mvc.pathmatch.matching-strategy=ant_path_matcher

logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=INFO
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.format_sql=true

server.error.include-stacktrace=always
spring.mvc.problem-details.enabled=true

jwt.secret=${JWT_SECRET}
app.db-encrytion.key=${DB_ENCRYPTION_KEY}

app.db.init=all

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# S3 / MinIO storage
app.storage.endpoint=${APP_STORAGE_ENDPOINT:}
app.storage.public-url=${APP_STORAGE_PUBLIC_URL:http://localhost:9000}
app.storage.bucket-name=${APP_STORAGE_BUCKET_NAME:images}
app.storage.region=${APP_STORAGE_REGION:us-east-1}

spring.mail.host=smtp.gmail.com
spring.mail.port=${SENDER_MAIL_PORT}
spring.mail.username=${SENDER_MAIL_ADDRESS}
spring.mail.password=${SENDER_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
google.auth.clientId=${GOOGLE_AUTH_CLIENT_ID}

app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN:https://localhost:4202}

app.cookie.secure=true
app.cookie.same-site=${APP_COOKIE_SAME_SITE:Lax}

nominatim.base-url=${NOMINATIM_BASE_URL:https://nominatim.openstreetmap.org}
nominatim.user-agent=${NOMINATIM_USER_AGENT:Frict-Backend/1.0 (contact@frict.local)}

osrm.base-url=${OSRM_BASE_URL:https://router.project-osrm.org}

notifications.stock.low-threshold=5

spring.flyway.enabled=false
