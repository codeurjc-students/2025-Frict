# Profile: prod — activated via SPRING_PROFILES_ACTIVE=prod in Fargate TaskDefinition
# Configuration specific to AWS deployment (ECS Fargate + RDS + DocumentDB + S3).
# Values here override application.properties when this profile is active.

# First deployment: use 'update' to let Hibernate create the schema.
# After baseline is established, switch to 'validate'.
spring.jpa.hibernate.ddl-auto=update
app.db.init=none

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

logging.level.com.tfg.backend=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
spring.mvc.log-request-details=false
server.error.include-stacktrace=never

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
