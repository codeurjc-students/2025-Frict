name: frict

x-app-common: &app-common
  build:
    context: ..
    dockerfile: docker/Dockerfile
  restart: unless-stopped
  env_file:
    - path: ../backend/.env
      required: false
  environment:
    SPRING_PROFILES_ACTIVE: local
    SERVER_SSL_ENABLED: "false"
    APP_COOKIE_SECURE: "false"
    MYSQL_HOST: mysql
    MYSQL_PORT: "3306"
    MYSQL_DATABASE: Frict
    MYSQL_USERNAME: user
    MYSQL_PASSWORD: password
    MONGODB_URI: "mongodb://user:password@mongodb:27017/Frict?authSource=admin&replicaSet=rs0"
    APP_STORAGE_ENDPOINT: http://minio:9000
    APP_STORAGE_PUBLIC_URL: http://localhost:9000
    APP_STORAGE_BUCKET_NAME: images
    AWS_ACCESS_KEY_ID: user
    AWS_SECRET_ACCESS_KEY: password
    CORS_ALLOWED_ORIGIN: http://localhost
  depends_on:
    mysql:
      condition: service_healthy
    minio:
      condition: service_healthy
    mongodb:
      condition: service_healthy

services:
  haproxy:
    image: haproxy:2.9
    container_name: frict-haproxy
    ports:
      - "80:80"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      - app-1
      - app-2
      - app-3

  app-1:
    <<: *app-common
    container_name: frict-app-1

  app-2:
    <<: *app-common
    container_name: frict-app-2

  app-3:
    <<: *app-common
    container_name: frict-app-3

  mysql:
    image: mysql:8.0
    container_name: frict-mysql
    restart: unless-stopped
    expose:
      - "3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: Frict
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mongodb:
    image: mongo:latest
    container_name: frict-mongo
    restart: unless-stopped
    expose:
      - "27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=user
      - MONGO_INITDB_ROOT_PASSWORD=password
    command: >
      sh -c "echo 'frictSuperSecretReplicaKey123456' > /data/keyfile &&
      chmod 400 /data/keyfile &&
      chown 999:999 /data/keyfile &&
      exec /usr/local/bin/docker-entrypoint.sh mongod --replSet rs0 --keyFile /data/keyfile --bind_ip_all"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: >
        mongosh --username user --password password --authenticationDatabase admin
        --eval "try { rs.status() } catch (e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongodb:27017'}]}) }" --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: frict-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: "user"
      MINIO_ROOT_PASSWORD: "password"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
  mongodb_data:
  minio_data:
