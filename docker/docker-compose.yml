name: frict-latest

services:
  # ----------------------------------------------------------------
  # 1. HTTPS CERTIFICATES GENERATOR (Init Container)
  # ----------------------------------------------------------------
  cert-gen:
    image: alpine/openssl
    container_name: cert-gen-latest
    volumes:
      - minio_certs:/certs
    working_dir: /certs
    command: >
      req -x509 -nodes -days 365 -newkey rsa:2048 
      -keyout private.key 
      -out public.crt 
      -subj "/CN=minio" 
      -addext "subjectAltName = DNS:minio, DNS:localhost, IP:127.0.0.1"

  # ----------------------------------------------------------------
  # 2. DATABASE SERVICE (MYSQL)
  # ----------------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: db-latest
    restart: unless-stopped
    expose:
      - "3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: Frict
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - mysql_data_latest:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ----------------------------------------------------------------
  # 3. DATABASE SERVICE (MONGODB)
  # ----------------------------------------------------------------
  mongodb:
    image: mongo:latest
    container_name: frict-mongo-latest
    restart: unless-stopped
    expose:
      - "27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=user
      - MONGO_INITDB_ROOT_PASSWORD=password
    command: >
      sh -c "echo 'frictSuperSecretReplicaKey123456' > /data/keyfile &&
      chmod 400 /data/keyfile &&
      chown 999:999 /data/keyfile &&
      exec /usr/local/bin/docker-entrypoint.sh mongod --replSet rs0 --keyFile /data/keyfile --bind_ip_all"
    volumes:
      - mongodb_data_latest:/data/db
    healthcheck:
      test: >
        mongosh --username $MONGO_INITDB_ROOT_USERNAME --password $MONGO_INITDB_ROOT_PASSWORD --authenticationDatabase admin
        --eval "try { rs.status() } catch (e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongodb:27017'}]}) }" --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ----------------------------------------------------------------
  # 4. MINIO HTTPS SERVICE
  # ----------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio_https_latest
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: "admin"
      MINIO_ROOT_PASSWORD: "password123"
      MINIO_SERVER_URL: "https://localhost:9000"
      MINIO_BROWSER_REDIRECT_URL: "https://localhost:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data_https:/data
      - minio_certs:/root/.minio/certs
    depends_on:
      cert-gen:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-k", "-f", "https://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------
  # 5. APPLICATION (Spring Boot + Angular)
  # ----------------------------------------------------------------
  app:
    image: mjpulido/frict:${IMAGE_TAG}
    container_name: app-latest
    restart: unless-stopped
    ports:
      - "443:8443"

    environment:
      # --- MySQL Database ---
      MYSQL_URL: jdbc:mysql://mysql:3306/Frict?useSSL=false&allowPublicKeyRetrieval=true
      MYSQL_USERNAME: user
      MYSQL_PASSWORD: password

      # --- MongoDB Database ---
      MONGODB_URI: mongodb://mongodb:27017/Frict?authSource=admin&replicaSet=rs0
      MONGODB_USERNAME: user
      MONGODB_PASSWORD: password

      # --- MinIO ---
      S3_ENDPOINT: https://minio:9000
      S3_PUBLIC_URL: https://localhost:9000
      S3_ACCESS_KEY: admin
      S3_SECRET_KEY: password123
      S3_BUCKET_NAME: images

      # --- Security (Test values) ---
      JWT_SECRET: c3VwZXJfc2VjcmV0X2tleV9mb3JfZGV2ZWxvcG1lbnRfcHVycG9zZXNfb25seV8xMjM0NTY3ODkw
      CARDS_DB_KEY: 1234567890123456
      CORS_ALLOWED_ORIGIN: https://localhost

      # --- Email and Auth (Real variables required) ---
      SENDER_MAIL_PORT: ${SENDER_MAIL_PORT}
      SENDER_MAIL_ADDRESS: ${SENDER_MAIL_ADDRESS}
      SENDER_MAIL_PASSWORD: ${SENDER_MAIL_PASSWORD}
      GOOGLE_AUTH_CLIENT_ID: ${GOOGLE_AUTH_CLIENT_ID}

    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_healthy
      mongodb:
        condition: service_healthy

volumes:
  mysql_data_latest:
  minio_data_https:
  minio_certs:
  mongodb_data_latest: