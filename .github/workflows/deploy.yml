name: Deploy

on:
  workflow_run:
    workflows: ["Publish Docker Image & Compose OCI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        options: [frict, loadtest]
        default: frict
      image_tag:
        description: "Docker image tag to deploy (manual runs)"
        type: string
        required: false
        default: "dev"
      hibernate_ddl_auto:
        description: "Hibernate schema mode"
        type: choice
        options: [validate, update]
        default: validate
      restore_from_snapshot:
        description: "Restore DBs from the latest manual prod snapshot (only on first deploy of an env)"
        type: choice
        options: ["true", "false"]
        default: "true"

permissions:
  id-token: write
  contents: read
  actions: read

# Per-environment resource names are derived in a "Resolve environment" step in
# each job (GITHUB_ENV is per-job). The automatic workflow_run trigger has no
# inputs, so environment defaults to 'frict'.
env:
  AWS_REGION: eu-west-1
  DOCKERHUB_IMAGE: mjpulido/frict

jobs:

  # ── 1. Pull image from Docker Hub and push to ECR ────────────────────
  push-to-ecr:
    name: Push Image to ECR
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      tag: ${{ steps.tag.outputs.value }}
    steps:
      - name: Resolve environment
        run: |
          ENV="${{ inputs.environment || 'frict' }}"
          echo "ECR_REPOSITORY=$ENV-app" >> "$GITHUB_ENV"
          echo "Target environment: $ENV (ECR repo: $ENV-app)"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories \
            --repository-names $ECR_REPOSITORY \
            --region $AWS_REGION 2>/dev/null || \
          aws ecr create-repository \
            --repository-name $ECR_REPOSITORY \
            --image-scanning-configuration scanOnPush=true \
            --region $AWS_REGION

          aws ecr put-lifecycle-policy \
            --repository-name $ECR_REPOSITORY \
            --lifecycle-policy-text '{"rules":[{"rulePriority":1,"description":"Keep last 10 images","selection":{"tagStatus":"any","countType":"imageCountMoreThan","countNumber":10},"action":{"type":"expire"}}]}' \
            --region $AWS_REGION 2>/dev/null || true

      - name: Download image tag artifact
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: image-tag
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Resolve image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "value=$(cat image_tag.txt)" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Pull from Docker Hub and push to ECR
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          TAG: ${{ steps.tag.outputs.value }}
        run: |
          docker pull $DOCKERHUB_IMAGE:$TAG
          docker tag $DOCKERHUB_IMAGE:$TAG $REGISTRY/$ECR_REPOSITORY:$TAG
          docker push $REGISTRY/$ECR_REPOSITORY:$TAG

  # ── 2. Deploy infrastructure ─────────────────────────────────────────
  infra:
    name: Deploy Infrastructure
    needs: [push-to-ecr]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve environment
        run: |
          ENV="${{ inputs.environment || 'frict' }}"
          echo "STACK_NAME=$ENV"          >> "$GITHUB_ENV"
          echo "RDS_INSTANCE=$ENV-mysql"  >> "$GITHUB_ENV"
          echo "DOCDB_CLUSTER=$ENV-docdb" >> "$GITHUB_ENV"

          # Restore always clones from PROD's latest manual snapshot (loadtest reads prod;
          # a fresh prod deploy reads its own). Controlled by the restore_from_snapshot input.
          echo "RESTORE_SOURCE=frict" >> "$GITHUB_ENV"
          echo "RESTORE_FROM_SNAPSHOT=${{ inputs.restore_from_snapshot || 'true' }}" >> "$GITHUB_ENV"

          # Domain derives from the prod apex (secrets.DOMAIN_NAME) as the single source
          # of truth: prod uses it directly, non-prod prefixes its env name as subdomain
          # (e.g. loadtest -> loadtest.frict.es). Follows automatically if the apex changes.
          PROD_DOMAIN="${{ secrets.DOMAIN_NAME }}"
          if [ "$ENV" = "frict" ]; then
            DOMAIN="$PROD_DOMAIN"
          else
            DOMAIN="${ENV}.${PROD_DOMAIN}"
          fi
          echo "DOMAIN_NAME=$DOMAIN" >> "$GITHUB_ENV"

          # Guard: a non-prod env must never resolve to the prod apex, or edge.yml's
          # Route53 A record would repoint production DNS to the clone's CloudFront.
          if [ "$ENV" != "frict" ] && [ "$DOMAIN" = "$PROD_DOMAIN" ]; then
            echo "::error::Non-prod environment '$ENV' resolved to apex '$PROD_DOMAIN'. Aborting to protect prod DNS."
            exit 1
          fi
          echo "Environment: $ENV | Domain: $DOMAIN | Restore from snapshot: $RESTORE_FROM_SNAPSHOT (source: frict)"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 7200

      - name: Get AWS account ID
        id: account
        run: echo "id=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_OUTPUT"

      - name: Resolve snapshot parameters
        id: snap
        run: |
          MYSQL_SNAP=""
          DOCDB_SNAP=""

          STACK_STATUS=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --query "Stacks[0].StackStatus" --output text \
            --region $AWS_REGION 2>/dev/null || echo "DOES_NOT_EXIST")

          if [ "$STACK_STATUS" != "DOES_NOT_EXIST" ]; then
            # Stack exists: echo back the current parameter values unchanged so CloudFormation
            # sees no diff and never touches the running database instances.
            MYSQL_SNAP=$(aws cloudformation describe-stacks \
              --stack-name $STACK_NAME \
              --query "Stacks[0].Parameters[?ParameterKey=='MySQLSnapshotArn'].ParameterValue | [0]" \
              --output text --region $AWS_REGION 2>/dev/null || echo "")
            [ "$MYSQL_SNAP" = "None" ] && MYSQL_SNAP=""

            DOCDB_SNAP=$(aws cloudformation describe-stacks \
              --stack-name $STACK_NAME \
              --query "Stacks[0].Parameters[?ParameterKey=='DocDBSnapshotArn'].ParameterValue | [0]" \
              --output text --region $AWS_REGION 2>/dev/null || echo "")
            [ "$DOCDB_SNAP" = "None" ] && DOCDB_SNAP=""

            echo "Stack exists — keeping snapshot parameters unchanged"
            echo "  MySQLSnapshotArn:  ${MYSQL_SNAP:-<empty>}"
            echo "  DocDBSnapshotArn:  ${DOCDB_SNAP:-<empty>}"

          elif [ "$RESTORE_FROM_SNAPSHOT" = "true" ]; then
            # Stack does not exist + restore requested: clone the latest manual snapshot of PROD's
            # DBs ($RESTORE_SOURCE) into this env's new instances. The source DBs are only read;
            # restore creates brand-new instances and never touches the source.
            echo "Stack not found — restore mode: searching latest manual snapshots of '$RESTORE_SOURCE'..."

            MYSQL_SNAP=$(aws rds describe-db-snapshots \
              --db-instance-identifier "${RESTORE_SOURCE}-mysql" \
              --snapshot-type manual \
              --query "max_by(DBSnapshots[?Status=='available'], &SnapshotCreateTime).DBSnapshotArn" \
              --output text --region $AWS_REGION 2>/dev/null || echo "")
            [ "$MYSQL_SNAP" = "None" ] && MYSQL_SNAP=""

            DOCDB_SNAP=$(aws rds describe-db-cluster-snapshots \
              --db-cluster-identifier "${RESTORE_SOURCE}-docdb" \
              --snapshot-type manual \
              --query "max_by(DBClusterSnapshots[?Status=='available'], &SnapshotCreateTime).DBClusterSnapshotArn" \
              --output text --region $AWS_REGION 2>/dev/null || echo "")
            [ "$DOCDB_SNAP" = "None" ] && DOCDB_SNAP=""

            echo "  MySQLSnapshotArn:  ${MYSQL_SNAP:-NONE FOUND — fresh DB will be created}"
            echo "  DocDBSnapshotArn:  ${DOCDB_SNAP:-NONE FOUND — fresh cluster will be created}"
          else
            echo "Stack not found — fresh deploy (no snapshot restore)"
          fi

          echo "mysql=$MYSQL_SNAP" >> "$GITHUB_OUTPUT"
          echo "docdb=$DOCDB_SNAP" >> "$GITHUB_OUTPUT"

      - name: Ensure artifact bucket
        env:
          BUCKET: ${{ env.STACK_NAME }}-cfn-artifacts-${{ steps.account.outputs.id }}-${{ env.AWS_REGION }}
        run: |
          aws s3 mb "s3://$BUCKET" --region $AWS_REGION 2>/dev/null || true

      # Images bucket = persistent user data, NOT a stack resource. Created here
      # idempotently (create only if missing; never blocks) and never deleted on
      # destroy, so images survive across deploys/destroys. Name is deterministic
      # and matches what main.yml passes to the ECS task (APP_STORAGE_*).
      - name: Ensure images bucket (persistent)
        env:
          ACCOUNT_ID: ${{ steps.account.outputs.id }}
        run: |
          BUCKET="${STACK_NAME}-images-${ACCOUNT_ID}-${AWS_REGION}"

          if aws s3api head-bucket --bucket "$BUCKET" --region "$AWS_REGION" 2>/dev/null; then
            echo "Images bucket already exists — reusing: $BUCKET"
          else
            echo "Creating images bucket: $BUCKET"
            aws s3api create-bucket --bucket "$BUCKET" --region "$AWS_REGION" \
              --create-bucket-configuration LocationConstraint="$AWS_REGION"
          fi

          # Re-apply configuration every run (idempotent). Order matters: the public
          # access block must allow bucket policies before we set the public-read one.
          aws s3api put-public-access-block --bucket "$BUCKET" --region "$AWS_REGION" \
            --public-access-block-configuration \
            BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=false,RestrictPublicBuckets=false

          aws s3api put-bucket-cors --bucket "$BUCKET" --region "$AWS_REGION" \
            --cors-configuration "{\"CORSRules\":[{\"AllowedHeaders\":[\"*\"],\"AllowedMethods\":[\"GET\",\"PUT\"],\"AllowedOrigins\":[\"https://${DOMAIN_NAME}\"],\"MaxAgeSeconds\":3600}]}"

          POLICY=$(jq -n --arg acct "$ACCOUNT_ID" --arg bkt "$BUCKET" '{
            Version: "2012-10-17",
            Statement: [
              { Sid: "AllowFargateTaskRole", Effect: "Allow",
                Principal: { AWS: ("arn:aws:iam::" + $acct + ":root") },
                Action: ["s3:GetObject","s3:PutObject","s3:DeleteObject","s3:ListBucket"],
                Resource: [("arn:aws:s3:::" + $bkt), ("arn:aws:s3:::" + $bkt + "/*")] },
              { Sid: "AllowPublicRead", Effect: "Allow", Principal: "*",
                Action: "s3:GetObject", Resource: ("arn:aws:s3:::" + $bkt + "/*") }
            ]
          }')
          aws s3api put-bucket-policy --bucket "$BUCKET" --region "$AWS_REGION" --policy "$POLICY"

      - name: Package CloudFormation templates
        env:
          BUCKET: ${{ env.STACK_NAME }}-cfn-artifacts-${{ steps.account.outputs.id }}-${{ env.AWS_REGION }}
        run: |
          aws cloudformation package \
            --template-file infra/cloudformation/main.yml \
            --s3-bucket "$BUCKET" \
            --s3-prefix cfn-templates \
            --output-template-file infra/cloudformation/packaged.yml \
            --region $AWS_REGION

      - name: Lookup CloudFront prefix list ID
        id: prefix
        run: |
          PL_ID=$(aws ec2 describe-managed-prefix-lists \
            --filters "Name=prefix-list-name,Values=com.amazonaws.global.cloudfront.origin-facing" \
            --region $AWS_REGION \
            --query "PrefixLists[0].PrefixListId" --output text)
          echo "cf_prefix_list=$PL_ID" >> "$GITHUB_OUTPUT"

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file infra/cloudformation/packaged.yml \
            --stack-name $STACK_NAME \
            --region $AWS_REGION \
            --capabilities CAPABILITY_NAMED_IAM CAPABILITY_AUTO_EXPAND \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              "EnvironmentName=$STACK_NAME" \
              "DomainName=$DOMAIN_NAME" \
              "HostedZoneId=${{ secrets.HOSTED_ZONE_ID }}" \
              "CloudFrontCertificateArn=${{ secrets.CF_CERT_ARN }}" \
              "CloudFrontPrefixListId=${{ steps.prefix.outputs.cf_prefix_list }}" \
              "EnableDocDB=true" \
              "HibernateDdlAuto=${{ inputs.hibernate_ddl_auto || 'validate' }}" \
              "SenderMailHost=${{ secrets.SENDER_MAIL_HOST }}" \
              "SenderMailAddress=${{ secrets.SENDER_MAIL_ADDRESS }}" \
              "SenderMailUsername=${{ secrets.SENDER_MAIL_USERNAME }}" \
              "SenderMailPassword=${{ secrets.SENDER_MAIL_PASSWORD }}" \
              "SenderMailPort=${{ secrets.SENDER_MAIL_PORT || '587' }}" \
              "GoogleAuthClientId=${{ secrets.GOOGLE_AUTH_CLIENT_ID }}" \
              "MySQLSnapshotArn=${{ steps.snap.outputs.mysql }}" \
              "DocDBSnapshotArn=${{ steps.snap.outputs.docdb }}" \
              "MySQLMasterPassword=${{ secrets.RDS_MASTER_PASSWORD }}" \
              "DocDBMasterPassword=${{ secrets.DOCDB_MASTER_PASSWORD }}" \
              "DBEncryptionKey=${{ secrets.RDS_ENCRYPTION_KEY }}" \
              "ImageTag=${{ needs.push-to-ecr.outputs.tag }}"

      - name: Upload default images to S3
        run: |
          ACCOUNT_ID="${{ steps.account.outputs.id }}"
          BUCKET="${STACK_NAME}-images-${ACCOUNT_ID}-${AWS_REGION}"

          declare -A IMAGES=(
            ["backend/src/main/resources/static/img/defaultUserImage.jpg"]="users/default-user.jpg"
            ["backend/src/main/resources/static/img/defaultCategoryImage.jpg"]="categories/default-category.jpg"
            ["backend/src/main/resources/static/img/defaultProductImage.jpg"]="products/default-product.jpg"
            ["backend/src/main/resources/static/img/defaultShopImage.jpg"]="shops/default-shop.jpg"
          )

          for LOCAL in "${!IMAGES[@]}"; do
            KEY="${IMAGES[$LOCAL]}"
            if aws s3api head-object --bucket "$BUCKET" --key "$KEY" --region $AWS_REGION 2>/dev/null; then
              echo "Already exists: $KEY"
            else
              echo "Uploading: $KEY"
              aws s3 cp "$LOCAL" "s3://$BUCKET/$KEY" \
                --content-type image/jpeg --region $AWS_REGION
            fi
          done

      - name: Print stack outputs
        if: always()
        run: |
          aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --region $AWS_REGION \
            --query "Stacks[0].Outputs" \
            --output table 2>/dev/null || true

  # ── 3. Activate new image in ECS ─────────────────────────────────────
  activate:
    name: Activate Deployment
    needs: [infra]
    runs-on: ubuntu-latest
    steps:
      - name: Resolve environment
        run: |
          ENV="${{ inputs.environment || 'frict' }}"
          echo "ECS_CLUSTER=$ENV-cluster" >> "$GITHUB_ENV"
          echo "ECS_SERVICE=$ENV-svc"     >> "$GITHUB_ENV"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment \
            --region $AWS_REGION

      - name: Wait for service stability
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --region $AWS_REGION
