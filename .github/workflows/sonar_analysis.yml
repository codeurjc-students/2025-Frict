name: Code analysis with Sonarqube

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  RUNNER_MYSQL_NAME: FrictTest
  RUNNER_MYSQL_PASSWORD: password
  RUNNER_MONGODB_NAME: FrictTest
  RUNNER_MONGODB_USERNAME: root
  RUNNER_MONGODB_PASSWORD: password
  RUNNER_MINIO_BUCKET_NAME: images
  RUNNER_MINIO_USER: admin
  RUNNER_MINIO_PASSWORD: password123

jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: ${{ env.RUNNER_MYSQL_NAME }}
          MYSQL_ROOT_PASSWORD: ${{ env.RUNNER_MYSQL_PASSWORD }}
        ports:
          - 3307:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Start MongoDB Replica Set
        run: |
          docker run -d -p 27018:27017 --name mongodb \
            -e MONGO_INITDB_ROOT_USERNAME=${{ env.RUNNER_MONGODB_USERNAME }} \
            -e MONGO_INITDB_ROOT_PASSWORD=${{ env.RUNNER_MONGODB_PASSWORD }} \
            mongo:latest \
            sh -c "echo 'frictSuperSecretReplicaKey123456' > /data/keyfile && chmod 400 /data/keyfile && chown 999:999 /data/keyfile && exec /usr/local/bin/docker-entrypoint.sh mongod --replSet rs0 --keyFile /data/keyfile --bind_ip_all"
          
          sleep 10
          docker exec mongodb mongosh --username ${{ env.RUNNER_MONGODB_USERNAME }} --password ${{ env.RUNNER_MONGODB_PASSWORD }} --authenticationDatabase admin --eval "rs.initiate({_id:'rs0',members:[{_id:0,host:'127.0.0.1:27017'}]})"

      - name: Start MinIO and Create Bucket
        env:
          AWS_ACCESS_KEY_ID: ${{ env.RUNNER_MINIO_USER }}
          AWS_SECRET_ACCESS_KEY: ${{ env.RUNNER_MINIO_PASSWORD }}
          AWS_REGION: us-east-1
        run: |
          mkdir -p /tmp/minio_certs
          cp -r $(pwd)/docker/minio_https/certs/* /tmp/minio_certs/

          docker run -d \
            -p 9000:9000 \
            -p 9001:9001 \
            --name minio \
            -v /tmp/minio_certs:/root/.minio/certs \
            -e MINIO_ROOT_USER=${{ env.RUNNER_MINIO_USER }} \
            -e MINIO_ROOT_PASSWORD=${{ env.RUNNER_MINIO_PASSWORD }} \
            minio/minio server /data --console-address ":9001"

          sleep 5

          aws --endpoint-url https://localhost:9000 --no-verify-ssl s3 mb s3://${{ env.RUNNER_MINIO_BUCKET_NAME }}


      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'
          cache: 'maven'


      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json


      - name: Install Frontend Dependencies
        working-directory: frontend
        run: |
          npm ci
          npm install -g @angular/cli


      - name: Run Frontend Tests with Coverage
        working-directory: frontend
        run: ng test --watch=false --code-coverage --browsers=ChromeHeadlessNoSandbox


      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar


      - name: Generate SSL certs for Angular dev server
        working-directory: frontend
        run: |
          mkdir -p certs
          openssl req -x509 -nodes -days 1 -newkey rsa:2048 \
            -keyout certs/localhost-key.pem \
            -out certs/localhost.pem \
            -subj "/CN=localhost"


      - name: Start Angular for E2E Tests
        working-directory: frontend
        run: ng serve &


      - name: Build and test backend
        working-directory: backend
        run: mvn -B verify -Dspring.profiles.active=test

      - name: Run SonarQube Cloud Analysis
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
