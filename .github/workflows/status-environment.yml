name: Environment Status

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-1
  ECS_CLUSTER: frict-cluster
  ECS_SERVICE: frict-svc
  RDS_INSTANCE: frict-mysql
  DOCDB_CLUSTER: frict-docdb
  STACK_NAME: frict

jobs:
  status:
    name: Check Environment
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check all services
        run: |
          echo "==============================="
          echo "  Environment Status"
          echo "==============================="
          echo ""

          # ── CloudFormation Stack ──
          STACK_STATUS=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --query "Stacks[0].StackStatus" --output text \
            --region $AWS_REGION 2>/dev/null || echo "NOT FOUND")
          echo "CloudFormation:  $STACK_STATUS"

          # ── ECS ──
          ECS_INFO=$(aws ecs describe-services \
            --cluster $ECS_CLUSTER --services $ECS_SERVICE \
            --query "services[0].{running:runningCount,desired:desiredCount,status:status}" \
            --output json --region $AWS_REGION 2>/dev/null || echo "{}")
          RUNNING=$(echo "$ECS_INFO" | jq -r '.running // "?"')
          DESIRED=$(echo "$ECS_INFO" | jq -r '.desired // "?"')
          SVC_STATUS=$(echo "$ECS_INFO" | jq -r '.status // "NOT FOUND"')
          if [ "$RUNNING" = "0" ] && [ "$DESIRED" = "0" ]; then
            ECS_LABEL="STOPPED (0/0 tasks)"
          elif [ "$RUNNING" = "$DESIRED" ]; then
            ECS_LABEL="RUNNING ($RUNNING/$DESIRED tasks)"
          else
            ECS_LABEL="SCALING ($RUNNING/$DESIRED tasks)"
          fi
          echo "ECS Fargate:     $ECS_LABEL"

          # ── RDS MySQL ──
          RDS_STATUS=$(aws rds describe-db-instances \
            --db-instance-identifier $RDS_INSTANCE \
            --query "DBInstances[0].DBInstanceStatus" --output text \
            --region $AWS_REGION 2>/dev/null || echo "NOT FOUND")
          echo "RDS MySQL:       $RDS_STATUS"

          # ── DocumentDB ──
          DOCDB_STATUS=$(aws rds describe-db-clusters \
            --db-cluster-identifier $DOCDB_CLUSTER \
            --query "DBClusters[0].Status" --output text \
            --region $AWS_REGION 2>/dev/null || echo "NOT FOUND")
          echo "DocumentDB:      $DOCDB_STATUS"

          # ── ALB Health ──
          TG_ARN=$(aws elbv2 describe-target-groups \
            --names "${STACK_NAME}-tg" \
            --query "TargetGroups[0].TargetGroupArn" --output text \
            --region $AWS_REGION 2>/dev/null || echo "")
          if [ -n "$TG_ARN" ] && [ "$TG_ARN" != "None" ]; then
            HEALTHY=$(aws elbv2 describe-target-health \
              --target-group-arn "$TG_ARN" \
              --query "length(TargetHealthDescriptions[?TargetHealth.State=='healthy'])" \
              --output text --region $AWS_REGION 2>/dev/null || echo "0")
            TOTAL=$(aws elbv2 describe-target-health \
              --target-group-arn "$TG_ARN" \
              --query "length(TargetHealthDescriptions)" \
              --output text --region $AWS_REGION 2>/dev/null || echo "0")
            echo "ALB Targets:     $HEALTHY/$TOTAL healthy"
          else
            echo "ALB Targets:     NOT FOUND"
          fi

          # ── Site URL ──
          SITE_URL=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --query "Stacks[0].Outputs[?OutputKey=='SiteUrl'].OutputValue" \
            --output text --region $AWS_REGION 2>/dev/null || echo "")
          echo ""
          if [ -n "$SITE_URL" ] && [ "$SITE_URL" != "None" ]; then
            echo "Site URL:        $SITE_URL"
          fi

          # ── Overall verdict ──
          echo ""
          if [ "$RDS_STATUS" = "available" ] && [ "$RUNNING" != "0" ] && [ "$RUNNING" = "$DESIRED" ]; then
            echo ">>> READY"
          elif [ "$RUNNING" = "0" ] && [ "$RDS_STATUS" = "stopped" ]; then
            echo ">>> STOPPED"
          else
            echo ">>> TRANSITIONING"
          fi
