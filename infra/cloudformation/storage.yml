AWSTemplateFormatVersion: "2010-09-09"
Description: "Frict — S3 bucket for images"

Parameters:
  EnvironmentName:
    Type: String
    Default: frict
  DomainName:
    Type: String
    Description: Domain used for CORS on the S3 bucket (e.g. app.example.com)
    Default: ""

Conditions:
  HasDomain: !Not [!Equals [!Ref DomainName, ""]]

Resources:

  # ── S3 — Images ─────────────────────────────────────────────────────
  ImagesBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub "${EnvironmentName}-images-${AWS::AccountId}-${AWS::Region}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: false
        IgnorePublicAcls: true
        RestrictPublicBuckets: false
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ["*"]
            AllowedMethods: [GET, PUT]
            AllowedOrigins:
              - !If
                - HasDomain
                - !Sub "https://${DomainName}"
                - "*"
            MaxAge: 3600

  ImagesBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ImagesBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowFargateTaskRole
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action:
              - "s3:GetObject"
              - "s3:PutObject"
              - "s3:DeleteObject"
              - "s3:ListBucket"
            Resource:
              - !GetAtt ImagesBucket.Arn
              - !Sub "${ImagesBucket.Arn}/*"
          - Sid: AllowPublicRead
            Effect: Allow
            Principal: "*"
            Action: "s3:GetObject"
            Resource: !Sub "${ImagesBucket.Arn}/*"

Outputs:
  ImagesBucketName:
    Value: !Ref ImagesBucket
  ImagesBucketArn:
    Value: !GetAtt ImagesBucket.Arn
