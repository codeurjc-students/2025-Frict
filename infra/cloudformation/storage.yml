AWSTemplateFormatVersion: "2010-09-09"
Description: "Frict — S3 bucket for images and ECR repository"

Parameters:
  EnvironmentName:
    Type: String
    Default: frict
  DomainName:
    Type: String
    Description: Domain used for CORS on the S3 bucket (e.g. app.example.com)
    Default: ""

Conditions:
  HasDomain: !Not [!Equals [!Ref DomainName, ""]]

Resources:

  # ── S3 — Images ─────────────────────────────────────────────────────
  ImagesBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub "${EnvironmentName}-images-${AWS::AccountId}-${AWS::Region}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ["*"]
            AllowedMethods: [GET, PUT]
            AllowedOrigins:
              - !If
                - HasDomain
                - !Sub "https://${DomainName}"
                - "*"
            MaxAge: 3600

  ImagesBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ImagesBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowFargateTaskRole
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action:
              - "s3:GetObject"
              - "s3:PutObject"
              - "s3:DeleteObject"
              - "s3:ListBucket"
            Resource:
              - !GetAtt ImagesBucket.Arn
              - !Sub "${ImagesBucket.Arn}/*"

  # ── ECR ──────────────────────────────────────────────────────────────
  ECRRepository:
    Type: AWS::ECR::Repository
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      RepositoryName: !Sub "${EnvironmentName}-app"
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep last 10 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 10
                },
                "action": {
                  "type": "expire"
                }
              }
            ]
          }

Outputs:
  ImagesBucketName:
    Value: !Ref ImagesBucket
  ImagesBucketArn:
    Value: !GetAtt ImagesBucket.Arn
  ECRRepositoryUri:
    Value: !GetAtt ECRRepository.RepositoryUri
  ECRRepositoryArn:
    Value: !GetAtt ECRRepository.Arn
