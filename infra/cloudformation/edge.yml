AWSTemplateFormatVersion: "2010-09-09"
Description: "Frict — CloudFront distribution and Route53 DNS records"

Parameters:
  EnvironmentName:
    Type: String
    Default: frict
  DomainName:
    Type: String
    Description: Fully qualified domain name (e.g. app.example.com)
  HostedZoneId:
    Type: AWS::Route53::HostedZone::Id
    Description: Route53 hosted zone for the domain
  ALBDnsName:
    Type: String
  ALBHostedZoneId:
    Type: String
  CloudFrontCertificateArn:
    Type: String
    Description: ACM certificate ARN in us-east-1 for CloudFront

Resources:

  # ── CloudFront — Origin Request Policy (forward all for WS) ─────────
  WSOriginRequestPolicy:
    Type: AWS::CloudFront::OriginRequestPolicy
    Properties:
      OriginRequestPolicyConfig:
        Name: !Sub "${EnvironmentName}-ws-all-viewer"
        CookiesConfig:
          CookieBehavior: all
        HeadersConfig:
          HeaderBehavior: allViewerAndWhitelistCloudFront
          CloudFrontHeaders:
            - CloudFront-Forwarded-Proto
        QueryStringsConfig:
          QueryStringBehavior: all

  # ── CloudFront Distribution ─────────────────────────────────────────
  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Aliases:
          - !Ref DomainName
        ViewerCertificate:
          AcmCertificateArn: !Ref CloudFrontCertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        DefaultRootObject: ""
        HttpVersion: http2and3
        PriceClass: PriceClass_100
        Origins:
          - Id: ALBOrigin
            DomainName: !Ref ALBDnsName
            CustomOriginConfig:
              HTTPPort: 80
              HTTPSPort: 443
              OriginProtocolPolicy: http-only
              OriginReadTimeout: 60
              OriginKeepaliveTimeout: 60
        DefaultCacheBehavior:
          TargetOriginId: ALBOrigin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
          Compress: true
        CacheBehaviors:
          - PathPattern: "/api/v1/ws/*"
            TargetOriginId: ALBOrigin
            ViewerProtocolPolicy: redirect-to-https
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # CachingDisabled
            OriginRequestPolicyId: !Ref WSOriginRequestPolicy
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
          - PathPattern: "/api/*"
            TargetOriginId: ALBOrigin
            ViewerProtocolPolicy: redirect-to-https
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # CachingDisabled
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac  # AllViewerExceptHostHeader
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]

  # ── Route53 — DNS record ────────────────────────────────────────────
  DNSRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        HostedZoneId: Z2FDTNDATAQYW2  # CloudFront global hosted zone ID
        DNSName: !GetAtt Distribution.DomainName

Outputs:
  CloudFrontDomainName:
    Value: !GetAtt Distribution.DomainName
  CloudFrontDistributionId:
    Value: !Ref Distribution
  SiteUrl:
    Value: !Sub "https://${DomainName}"
