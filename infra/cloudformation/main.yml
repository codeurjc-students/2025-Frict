AWSTemplateFormatVersion: "2010-09-09"
Description: "Frict — Root stack orchestrating all nested stacks"

Parameters:
  EnvironmentName:
    Type: String
    Default: frict
  DomainName:
    Type: String
    Description: Fully qualified domain (e.g. app.example.com)
  HostedZoneId:
    Type: AWS::Route53::HostedZone::Id
    Description: Route53 hosted zone ID for the domain
  ImageTag:
    Type: String
    Default: latest
    Description: Docker image tag to deploy
  MinTaskCount:
    Type: Number
    Default: 2
  MaxTaskCount:
    Type: Number
    Default: 8
  EnableDocDB:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "true"
  HibernateDdlAuto:
    Type: String
    AllowedValues: ["update", "validate", "none"]
    Default: "update"
    Description: "update on first deploy; switch to validate once schema exists"
  CloudFrontCertificateArn:
    Type: String
    Description: ACM certificate ARN in us-east-1 for CloudFront
  SenderMailHost:
    Type: String
    Default: "email-smtp.eu-west-1.amazonaws.com"
  SenderMailAddress:
    Type: String
    Default: ""
    NoEcho: true
  SenderMailUsername:
    Type: String
    Default: ""
    NoEcho: true
  SenderMailPassword:
    Type: String
    Default: ""
    NoEcho: true
  SenderMailPort:
    Type: String
    Default: "587"
  GoogleAuthClientId:
    Type: String
    Default: ""
    NoEcho: true
  MySQLSnapshotArn:
    Type: String
    Default: ""
  DocDBSnapshotArn:
    Type: String
    Default: ""
  MySQLMasterPassword:
    Type: String
    NoEcho: true
  DocDBMasterPassword:
    Type: String
    NoEcho: true
  DBEncryptionKey:
    Type: String
    NoEcho: true
  CloudFrontPrefixListId:
    Type: String
    Description: AWS-managed prefix list ID for CloudFront origin-facing IPs

Resources:

  # ── Network ──────────────────────────────────────────────────────────
  NetworkStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: ./network.yml
      Parameters:
        EnvironmentName: !Ref EnvironmentName
        CloudFrontPrefixListId: !Ref CloudFrontPrefixListId

  # Note: the images S3 bucket is intentionally NOT managed here. It is persistent
  # state (user images) and must outlive this ephemeral app stack, so it is created
  # idempotently by the deploy workflow and never deleted on stack destroy. Its name
  # is deterministic: "${EnvironmentName}-images-${AWS::AccountId}-${AWS::Region}".

  # ── Data (RDS + DocumentDB + Secrets) ────────────────────────────────
  DataStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: ./data.yml
      Parameters:
        EnvironmentName: !Ref EnvironmentName
        VPCId: !GetAtt NetworkStack.Outputs.VPCId
        PrivateSubnetAId: !GetAtt NetworkStack.Outputs.PrivateSubnetAId
        PrivateSubnetBId: !GetAtt NetworkStack.Outputs.PrivateSubnetBId
        RDSSecurityGroupId: !GetAtt NetworkStack.Outputs.RDSSecurityGroupId
        DocDBSecurityGroupId: !GetAtt NetworkStack.Outputs.DocDBSecurityGroupId
        EnableDocDB: !Ref EnableDocDB
        MySQLSnapshotArn: !Ref MySQLSnapshotArn
        DocDBSnapshotArn: !Ref DocDBSnapshotArn
        MySQLMasterPassword: !Ref MySQLMasterPassword
        DocDBMasterPassword: !Ref DocDBMasterPassword
        DBEncryptionKey: !Ref DBEncryptionKey
        SenderMailHost: !Ref SenderMailHost
        SenderMailAddress: !Ref SenderMailAddress
        SenderMailUsername: !Ref SenderMailUsername
        SenderMailPassword: !Ref SenderMailPassword
        SenderMailPort: !Ref SenderMailPort
        GoogleAuthClientId: !Ref GoogleAuthClientId

  # ── Lambda (geocoding + DocDB auto-stop) ─────────────────────────────
  LambdaStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: ./lambda.yml
      Parameters:
        EnvironmentName: !Ref EnvironmentName
        DocDBClusterId: !If
          - DocDBEnabled
          - !GetAtt DataStack.Outputs.DocDBClusterId
          - ""
        EnableDocDB: !Ref EnableDocDB

  # ── Compute (ECS + ALB + autoscaling) ────────────────────────────────
  ComputeStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: ./compute.yml
      Parameters:
        EnvironmentName: !Ref EnvironmentName
        VPCId: !GetAtt NetworkStack.Outputs.VPCId
        PublicSubnetAId: !GetAtt NetworkStack.Outputs.PublicSubnetAId
        PublicSubnetBId: !GetAtt NetworkStack.Outputs.PublicSubnetBId
        PrivateSubnetAId: !GetAtt NetworkStack.Outputs.PrivateSubnetAId
        PrivateSubnetBId: !GetAtt NetworkStack.Outputs.PrivateSubnetBId
        ALBSecurityGroupId: !GetAtt NetworkStack.Outputs.ALBSecurityGroupId
        FargateSecurityGroupId: !GetAtt NetworkStack.Outputs.FargateSecurityGroupId
        ImageUri: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${EnvironmentName}-app:${ImageTag}"
        ImagesBucketName: !Sub "${EnvironmentName}-images-${AWS::AccountId}-${AWS::Region}"
        ImagesBucketArn: !Sub "arn:aws:s3:::${EnvironmentName}-images-${AWS::AccountId}-${AWS::Region}"
        MySQLEndpoint: !GetAtt DataStack.Outputs.MySQLEndpoint
        MySQLPort: !GetAtt DataStack.Outputs.MySQLPort
        MySQLSecretArn: !GetAtt DataStack.Outputs.MySQLSecretArn
        JWTSecretArn: !GetAtt DataStack.Outputs.JWTSecretArn
        DBEncryptionKeySecretArn: !GetAtt DataStack.Outputs.DBEncryptionKeySecretArn
        MailSecretArn: !GetAtt DataStack.Outputs.MailSecretArn
        GoogleAuthSecretArn: !GetAtt DataStack.Outputs.GoogleAuthSecretArn
        DocDBEndpoint: !If
          - DocDBEnabled
          - !GetAtt DataStack.Outputs.DocDBEndpoint
          - ""
        DocDBPort: !If
          - DocDBEnabled
          - !GetAtt DataStack.Outputs.DocDBPort
          - "27017"
        DocDBSecretArn: !If
          - DocDBEnabled
          - !GetAtt DataStack.Outputs.DocDBSecretArn
          - ""
        GeocodingFunctionName: !GetAtt LambdaStack.Outputs.GeocodingFunctionName
        GeocodingFunctionArn: !GetAtt LambdaStack.Outputs.GeocodingFunctionArn
        GoogleAuthFunctionName: !GetAtt LambdaStack.Outputs.GoogleAuthFunctionName
        GoogleAuthFunctionArn: !GetAtt LambdaStack.Outputs.GoogleAuthFunctionArn
        OsrmFunctionName: !GetAtt LambdaStack.Outputs.OsrmFunctionName
        OsrmFunctionArn: !GetAtt LambdaStack.Outputs.OsrmFunctionArn
        CORSAllowedOrigin: !Sub "https://${DomainName}"
        MinTaskCount: !Ref MinTaskCount
        MaxTaskCount: !Ref MaxTaskCount
        EnableDocDB: !Ref EnableDocDB
        HibernateDdlAuto: !Ref HibernateDdlAuto

  # ── Edge (CloudFront + Route53) ──────────────────────────────────────
  EdgeStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: ./edge.yml
      Parameters:
        EnvironmentName: !Ref EnvironmentName
        DomainName: !Ref DomainName
        HostedZoneId: !Ref HostedZoneId
        ALBDnsName: !GetAtt ComputeStack.Outputs.ALBDnsName
        ALBHostedZoneId: !GetAtt ComputeStack.Outputs.ALBHostedZoneId
        CloudFrontCertificateArn: !Ref CloudFrontCertificateArn

Conditions:
  DocDBEnabled: !Equals [!Ref EnableDocDB, "true"]

Outputs:
  SiteUrl:
    Value: !GetAtt EdgeStack.Outputs.SiteUrl
  CloudFrontDomain:
    Value: !GetAtt EdgeStack.Outputs.CloudFrontDomainName
  ALBDnsName:
    Value: !GetAtt ComputeStack.Outputs.ALBDnsName
  ECSClusterName:
    Value: !GetAtt ComputeStack.Outputs.ECSClusterName
  ECSServiceName:
    Value: !GetAtt ComputeStack.Outputs.ECSServiceName
  ECRRepositoryUri:
    Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${EnvironmentName}-app"
  MySQLEndpoint:
    Value: !GetAtt DataStack.Outputs.MySQLEndpoint
