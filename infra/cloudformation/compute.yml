AWSTemplateFormatVersion: "2010-09-09"
Description: "Frict — ECS Fargate cluster, ALB, task definition, service, and autoscaling"

Parameters:
  EnvironmentName:
    Type: String
    Default: frict
  VPCId:
    Type: AWS::EC2::VPC::Id
  PublicSubnetAId:
    Type: AWS::EC2::Subnet::Id
  PublicSubnetBId:
    Type: AWS::EC2::Subnet::Id
  PrivateSubnetAId:
    Type: AWS::EC2::Subnet::Id
  PrivateSubnetBId:
    Type: AWS::EC2::Subnet::Id
  ALBSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
  FargateSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
  ImageUri:
    Type: String
    Description: "Full ECR image URI (repo:tag)"
  ImagesBucketName:
    Type: String
  ImagesBucketArn:
    Type: String
  MySQLEndpoint:
    Type: String
  MySQLPort:
    Type: String
    Default: "3306"
  MySQLSecretArn:
    Type: String
  JWTSecretArn:
    Type: String
  DocDBEndpoint:
    Type: String
    Default: ""
  DocDBPort:
    Type: String
    Default: "27017"
  DocDBSecretArn:
    Type: String
    Default: ""
  DBEncryptionKeySecretArn:
    Type: String
  MailSecretArn:
    Type: String
  GoogleAuthSecretArn:
    Type: String
  GeocodingFunctionName:
    Type: String
  GeocodingFunctionArn:
    Type: String
  GoogleAuthFunctionName:
    Type: String
  GoogleAuthFunctionArn:
    Type: String
  OsrmFunctionName:
    Type: String
  OsrmFunctionArn:
    Type: String
  CORSAllowedOrigin:
    Type: String
    Default: "*"
  HibernateDdlAuto:
    Type: String
    AllowedValues: ["update", "validate", "none"]
    Default: "update"
    Description: "update on first deploy to create the schema; switch to validate afterwards"
  MinTaskCount:
    Type: Number
    Default: 2
  MaxTaskCount:
    Type: Number
    Default: 8
  EnableDocDB:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "true"

Conditions:
  HasDocDB: !Equals [!Ref EnableDocDB, "true"]

Resources:

  # ── ECS Cluster ──────────────────────────────────────────────────────
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "${EnvironmentName}-cluster"
      ClusterSettings:
        - Name: containerInsights
          Value: enabled

  # ── CloudWatch Log Group ─────────────────────────────────────────────
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${EnvironmentName}"
      RetentionInDays: 14

  # ── IAM — Task Execution Role ────────────────────────────────────────
  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${EnvironmentName}-task-execution-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: SecretsAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Ref MySQLSecretArn
                  - !Ref JWTSecretArn
                  - !Ref DBEncryptionKeySecretArn
                  - !Ref MailSecretArn
                  - !Ref GoogleAuthSecretArn
                  - !If [HasDocDB, !Ref DocDBSecretArn, !Ref "AWS::NoValue"]

  # ── IAM — Task Role (app permissions) ────────────────────────────────
  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${EnvironmentName}-task-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub "${ImagesBucketArn}/*"
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: !Ref ImagesBucketArn
        - PolicyName: LambdaInvoke
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource:
                  - !Ref GeocodingFunctionArn
                  - !Ref GoogleAuthFunctionArn
                  - !Ref OsrmFunctionArn
        - PolicyName: SESAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource: "*"

  # ── ALB ──────────────────────────────────────────────────────────────
  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${EnvironmentName}-alb"
      Scheme: internet-facing
      Type: application
      Subnets:
        - !Ref PublicSubnetAId
        - !Ref PublicSubnetBId
      SecurityGroups:
        - !Ref ALBSecurityGroupId

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${EnvironmentName}-tg"
      VpcId: !Ref VPCId
      Port: 8443
      Protocol: HTTP
      TargetType: ip
      HealthCheckPath: /actuator/health
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      HealthCheckTimeoutSeconds: 10
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: "30"
        - Key: stickiness.enabled
          Value: "true"
        - Key: stickiness.type
          Value: lb_cookie
        - Key: stickiness.lb_cookie.duration_seconds
          Value: "86400"

  HTTPListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  # ── Task Definition ──────────────────────────────────────────────────
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${EnvironmentName}-app"
      Cpu: "512"
      Memory: "2048"
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: app
          Image: !Ref ImageUri
          Essential: true
          PortMappings:
            - ContainerPort: 8443
              Protocol: tcp
          Environment:
            - Name: SPRING_PROFILES_ACTIVE
              Value: prod
            - Name: MYSQL_HOST
              Value: !Ref MySQLEndpoint
            - Name: MYSQL_PORT
              Value: !Ref MySQLPort
            - Name: MYSQL_DATABASE
              Value: Frict
            - Name: APP_STORAGE_BUCKET_NAME
              Value: !Ref ImagesBucketName
            - Name: APP_STORAGE_REGION
              Value: !Ref "AWS::Region"
            - Name: APP_STORAGE_PUBLIC_URL
              Value: !Sub "https://${ImagesBucketName}.s3.${AWS::Region}.amazonaws.com"
            - Name: LAMBDA_GEOCODING_FUNCTION_NAME
              Value: !Ref GeocodingFunctionName
            - Name: LAMBDA_GOOGLE_AUTH_FUNCTION_NAME
              Value: !Ref GoogleAuthFunctionName
            - Name: LAMBDA_OSRM_FUNCTION_NAME
              Value: !Ref OsrmFunctionName
            - Name: CORS_ALLOWED_ORIGIN
              Value: !Ref CORSAllowedOrigin
            - !If
              - HasDocDB
              - Name: DOCDB_HOST
                Value: !Ref DocDBEndpoint
              - !Ref "AWS::NoValue"
            - !If
              - HasDocDB
              - Name: DOCDB_PORT
                Value: !Ref DocDBPort
              - !Ref "AWS::NoValue"
            - Name: HIBERNATE_DDL_AUTO
              Value: !Ref HibernateDdlAuto
            - Name: JAVA_OPTS
              Value: "-Xmx1536m -Xss256k -XX:MaxMetaspaceSize=256m"
          Secrets:
            - Name: MYSQL_USERNAME
              ValueFrom: !Sub "${MySQLSecretArn}:username::"
            - Name: MYSQL_PASSWORD
              ValueFrom: !Sub "${MySQLSecretArn}:password::"
            - Name: JWT_SECRET
              ValueFrom: !Ref JWTSecretArn
            - Name: DB_ENCRYPTION_KEY
              ValueFrom: !Ref DBEncryptionKeySecretArn
            - Name: SENDER_MAIL_HOST
              ValueFrom: !Sub "${MailSecretArn}:host::"
            - Name: SENDER_MAIL_ADDRESS
              ValueFrom: !Sub "${MailSecretArn}:address::"
            - Name: SENDER_MAIL_USERNAME
              ValueFrom: !Sub "${MailSecretArn}:username::"
            - Name: SENDER_MAIL_PASSWORD
              ValueFrom: !Sub "${MailSecretArn}:password::"
            - Name: SENDER_MAIL_PORT
              ValueFrom: !Sub "${MailSecretArn}:port::"
            - Name: GOOGLE_AUTH_CLIENT_ID
              ValueFrom: !Ref GoogleAuthSecretArn
            - !If
              - HasDocDB
              - Name: DOCDB_USERNAME
                ValueFrom: !Sub "${DocDBSecretArn}:username::"
              - !Ref "AWS::NoValue"
            - !If
              - HasDocDB
              - Name: DOCDB_PASSWORD
                ValueFrom: !Sub "${DocDBSecretArn}:password::"
              - !Ref "AWS::NoValue"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref "AWS::Region"
              awslogs-stream-prefix: app

  # ── ECS Service ──────────────────────────────────────────────────────
  ECSService:
    Type: AWS::ECS::Service
    DependsOn:
      - HTTPListener
    Properties:
      ServiceName: !Sub "${EnvironmentName}-svc"
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: !Ref MinTaskCount
      LaunchType: FARGATE
      HealthCheckGracePeriodSeconds: 120
      DeploymentConfiguration:
        MinimumHealthyPercent: 100
        MaximumPercent: 200
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - !Ref PrivateSubnetAId
            - !Ref PrivateSubnetBId
          SecurityGroups:
            - !Ref FargateSecurityGroupId
      LoadBalancers:
        - ContainerName: app
          ContainerPort: 8443
          TargetGroupArn: !Ref TargetGroup

  # ── Auto Scaling ─────────────────────────────────────────────────────
  ScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      ServiceNamespace: ecs
      ScalableDimension: ecs:service:DesiredCount
      ResourceId: !Sub "service/${ECSCluster}/${ECSService.Name}"
      MinCapacity: !Ref MinTaskCount
      MaxCapacity: !Ref MaxTaskCount

  ScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub "${EnvironmentName}-cpu-tracking"
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref ScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        TargetValue: 60
        ScaleOutCooldown: 60
        ScaleInCooldown: 300

  # ── CloudWatch Dashboard — load test + autoscaling ───────────────────
  LoadTestDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub "${EnvironmentName}-load-test"
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "text",
              "x": 0, "y": 0, "width": 24, "height": 1,
              "properties": {
                "markdown": "## ${EnvironmentName} — Autoescalado ECS durante prueba de carga k6\n*Namespace k6: k6/${EnvironmentName} · Cluster: ${EnvironmentName}-cluster · Servicio: ${EnvironmentName}-svc*"
              }
            },
            {
              "type": "metric",
              "x": 0, "y": 1, "width": 24, "height": 9,
              "properties": {
                "title": "Autoescalado ECS + Carga k6",
                "region": "${AWS::Region}",
                "view": "timeSeries",
                "stacked": false,
                "period": 60,
                "stat": "Average",
                "metrics": [
                  [ "AWS/ECS", "CPUUtilization",
                    "ClusterName", "${EnvironmentName}-cluster",
                    "ServiceName", "${EnvironmentName}-svc",
                    { "label": "% CPU (backend)", "color": "#e07070", "yAxis": "left" } ],
                  [ "AWS/ECS", "MemoryUtilization",
                    "ClusterName", "${EnvironmentName}-cluster",
                    "ServiceName", "${EnvironmentName}-svc",
                    { "label": "% Memoria (backend)", "color": "#70a0e0", "yAxis": "left" } ],
                  [ { "expression": "SEARCH('{k6/${EnvironmentName}} MetricName=\"vus\"', 'Maximum', 60)",
                      "label": "VUs activos (k6)", "color": "#9b6dd0", "yAxis": "right", "id": "vus" } ],
                  [ { "expression": "SEARCH('{k6/${EnvironmentName}} MetricName=\"http_reqs\"', 'Sum', 60)",
                      "label": "Req/min (k6)", "color": "#50a87e", "yAxis": "right", "id": "rps" } ]
                ],
                "yAxis": {
                  "left":  { "label": "% Utilización", "min": 0, "max": 100 },
                  "right": { "label": "VUs / Req·min⁻¹", "min": 0 }
                },
                "annotations": {
                  "horizontal": [
                    { "label": "Umbral scale-out (CPU 60%)", "value": 60,
                      "color": "#e07070", "fill": "above" }
                  ]
                },
                "legend": { "position": "bottom" },
                "liveData": false
              }
            },
            {
              "type": "metric",
              "x": 0, "y": 10, "width": 12, "height": 6,
              "properties": {
                "title": "Tareas ECS (desired / running)",
                "region": "${AWS::Region}",
                "view": "timeSeries",
                "stacked": false,
                "period": 60,
                "metrics": [
                  [ "ECS/ContainerInsights", "DesiredTaskCount",
                    "ClusterName", "${EnvironmentName}-cluster",
                    "ServiceName", "${EnvironmentName}-svc",
                    { "label": "Desired", "color": "#4a90d9", "stat": "Maximum" } ],
                  [ "ECS/ContainerInsights", "RunningTaskCount",
                    "ClusterName", "${EnvironmentName}-cluster",
                    "ServiceName", "${EnvironmentName}-svc",
                    { "label": "Running", "color": "#1D9E75", "stat": "Maximum" } ]
                ],
                "yAxis": { "left": { "min": 0, "max": 10, "label": "Tareas" } },
                "annotations": { "horizontal": [] },
                "legend": { "position": "bottom" }
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 10, "width": 12, "height": 6,
              "properties": {
                "title": "Latencia k6 (p95 · p99)",
                "region": "${AWS::Region}",
                "view": "timeSeries",
                "stacked": false,
                "period": 60,
                "metrics": [
                  [ { "expression": "SEARCH('{k6/${EnvironmentName}} MetricName=\"http_req_duration_p95\"', 'Average', 60)",
                      "label": "Latencia p95 (ms)", "color": "#BA7517", "id": "p95" } ],
                  [ { "expression": "SEARCH('{k6/${EnvironmentName}} MetricName=\"http_req_duration_p99\"', 'Average', 60)",
                      "label": "Latencia p99 (ms)", "color": "#E24B4A", "id": "p99" } ]
                ],
                "annotations": {
                  "horizontal": [
                    { "label": "SLO p95 < 800 ms", "value": 800, "color": "#BA7517" },
                    { "label": "SLO p99 < 2000 ms", "value": 2000, "color": "#E24B4A" }
                  ]
                },
                "yAxis": { "left": { "min": 0, "label": "ms" } },
                "legend": { "position": "bottom" }
              }
            },
            {
              "type": "metric",
              "x": 0, "y": 16, "width": 12, "height": 6,
              "properties": {
                "title": "Tasa de errores k6",
                "region": "${AWS::Region}",
                "view": "timeSeries",
                "stacked": false,
                "period": 60,
                "metrics": [
                  [ { "expression": "SEARCH('{k6/${EnvironmentName}} MetricName=\"http_req_failed\"', 'Average', 60)",
                      "label": "http_req_failed", "color": "#E24B4A" } ],
                  [ { "expression": "SEARCH('{k6/${EnvironmentName}} MetricName=\"errors\"', 'Average', 60)",
                      "label": "errores app", "color": "#D85A30" } ]
                ],
                "annotations": {
                  "horizontal": [
                    { "label": "SLO errors < 5%", "value": 0.05, "color": "#E24B4A", "fill": "above" }
                  ]
                },
                "yAxis": { "left": { "min": 0, "max": 0.2, "label": "Fracción" } },
                "legend": { "position": "bottom" }
              }
            },
            {
              "type": "metric",
              "x": 12, "y": 16, "width": 12, "height": 6,
              "properties": {
                "title": "ALB — Request count y latencia",
                "region": "${AWS::Region}",
                "view": "timeSeries",
                "stacked": false,
                "period": 60,
                "metrics": [
                  [ "AWS/ApplicationELB", "RequestCount",
                    "LoadBalancer", "${ALB.LoadBalancerFullName}",
                    { "label": "Requests/min", "color": "#50a87e", "stat": "Sum", "yAxis": "right" } ],
                  [ "AWS/ApplicationELB", "TargetResponseTime",
                    "LoadBalancer", "${ALB.LoadBalancerFullName}",
                    { "label": "Latencia ALB (s)", "color": "#378ADD", "stat": "p95", "yAxis": "left" } ]
                ],
                "yAxis": {
                  "left":  { "label": "Segundos", "min": 0 },
                  "right": { "label": "Requests/min", "min": 0 }
                },
                "annotations": { "horizontal": [] },
                "legend": { "position": "bottom" }
              }
            }
          ]
        }


Outputs:
  ALBDnsName:
    Value: !GetAtt ALB.DNSName
  ALBHostedZoneId:
    Value: !GetAtt ALB.CanonicalHostedZoneID
  ALBArn:
    Value: !Ref ALB
  ECSClusterName:
    Value: !Ref ECSCluster
  ECSServiceName:
    Value: !GetAtt ECSService.Name
  TaskExecutionRoleArn:
    Value: !GetAtt TaskExecutionRole.Arn
  TaskRoleArn:
    Value: !GetAtt TaskRole.Arn
  LoadTestDashboardUrl:
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${EnvironmentName}-load-test"